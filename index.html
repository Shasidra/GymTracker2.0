<title>GymTracker</title>

  <!--title>GymTracker</title-->
  <style w-tid="13">
    :root {
      --bg-color: #f4f4f4;
      --text-color: #333;
      --card-bg: white;
      --primary-color: #007AFF;
      --success-color: #34C759;
      --extra-color: #5856D6;
      --delete-color: #FF3B30;
      --border-color: #ddd;
      --progress-bg: #e0e0e0;
      --shadow-color: rgba(0,0,0,0.1);
      --input-bg: white; /* Added for consistency */
    }

    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --text-color: #ffffff;
      --card-bg: #2c2c2c;
      --primary-color: #0A84FF;
      --success-color: #30D158;
      --extra-color: #5E5CE6;
      --delete-color: #FF453A;
      --border-color: #3a3a3a;
      --progress-bg: #3a3a3a;
      --shadow-color: rgba(0,0,0,0.3);
      --input-bg: #3a3a3a; /* Added for dark mode */
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .title-container {
      display: flex;
      align-items: center;
      justify-content: center; /* Center items */
      gap: 10px; /* Reduced gap */
      margin-bottom: 20px;
      flex-wrap: wrap; /* Allow wrapping on smaller screens */
    }

    .app-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      color: var(--primary-color);
      font-size: 1.8em; /* Slightly smaller */
    }
    .muscle-group {
      background-color: var(--card-bg);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px var(--shadow-color);
      transition: background-color 0.3s;
    }
    .muscle-group h3 {
      margin-top: 0;
      color: var(--primary-color);
    }
    button {
      background-color: var(--primary-color);
      color: var(--card-bg); /* Changed to card-bg for better contrast */
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
      transition: background-color 0.2s, transform 0.1s; /* Added transitions */
    }
    button:active {
      transform: scale(0.98); /* Add press effect */
    }
    .delete-btn {
      background-color: var(--delete-color);
    }
    input[type="text"], input[type="number"], select {
      width: calc(100% - 22px); /* Keep padding in calc */
      padding: 10px;
      margin: 5px 0 10px 0; /* Added bottom margin */
      border: 1px solid var(--border-color);
      border-radius: 5px;
      font-size: 16px;
      background-color: var(--input-bg); /* Use variable */
      color: var(--text-color);
      box-sizing: border-box; /* Include padding in width */
    }
    .progress-bar {
      background-color: var(--progress-bg);
      border-radius: 5px;
      height: 20px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress {
      background-color: var(--success-color);
      height: 100%;
      border-radius: 5px;
      transition: width 0.3s ease-in-out;
    }
    .progress-extra {
      background-color: var(--extra-color);
      height: 100%;
    }
    .goal-reached {
      background-color: var(--success-color);
      color: var(--card-bg);
      padding: 5px 10px;
      border-radius: 5px;
      display: inline-block;
      margin-top: 10px;
    }
    .extra-sets {
      color: var(--extra-color);
      font-weight: bold;
      margin-left: 10px;
    }
    .settings {
      margin-top: 20px;
      padding: 15px;
      background-color: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 5px var(--shadow-color);
    }
    .settings h2 {
      margin-top: 0;
    }
    .theme-switch {
      display: flex;
      align-items: center;
      /* Removed margin-top */
      position: relative;
    }
    .theme-switch .switch {
      position: relative;
      display: inline-block;
      width: 180px;
      height: 40px;
      margin: 0 8px;
    }

    .theme-switch .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-switch .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #e5e5e5;
      transition: .4s;
      border-radius: 40px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
    }

    .theme-switch .slider:before {
      position: absolute;
      content: "";
      height: 32px;
      width: 32px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
      z-index: 2;
    }

    .theme-switch input:checked + .slider {
      background-color: #2c2c2c;
    }

    .theme-switch input:checked + .slider:before {
      transform: translateX(140px);
    }

    .theme-switch .slider:after {
      content: "DAYMODE";
      position: absolute;
      right: 50px;
      color: #333;
      font-weight: 500;
    }

    .theme-switch input:checked + .slider:after {
      content: "NIGHTMODE";
      color: white;
      left: 50px;
      right: auto;
    }

    /* Add sun/moon icons */
    .theme-switch .slider .sun-icon {
      width: 24px;
      height: 24px;
      position: absolute;
      left: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-switch .slider .moon-icon {
      width: 24px;
      height: 24px;
      position: absolute;
      right: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-switch .slider .sun-icon svg {
      width: 20px;
      height: 20px;
      fill: #333;
    }

    .theme-switch .slider .moon-icon svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .settings .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .settings .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .settings .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .settings .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    .settings input:checked + .slider {
      background-color: var(--success-color);
    }

    .settings input:checked + .slider:before {
      transform: translateX(26px);
    }
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap; /* Allow wrapping */
      gap: 10px; /* Add gap for wrapped items */
    }

    .top-controls select {
      width: auto; /* Annule la largeur 100% précédente */
      flex-grow: 1; /* Allow select to grow */
      min-width: 100px; /* Minimum width */
    }
    .theme-switch {
        flex-shrink: 0; /* Prevent shrinking */
    }

    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .celebrate {
      animation: celebrate 0.5s ease-in-out;
    }
    .info-button {
      background: var(--primary-color);
      color: var(--card-bg);
      width: 28px; /* Slightly larger */
      height: 28px; /* Slightly larger */
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px; /* Adjusted font size */
      font-style: italic;
      font-family: serif;
      margin-left: 5px; /* Reduced margin */
      flex-shrink: 0; /* Prevent shrinking */
    }

    .info-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px var(--shadow-color);
      z-index: 1000;
      max-width: 90%;
      width: 400px;
    }

    .info-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    .info-content {
      margin: 15px 0;
      line-height: 1.6;
    }

    .info-content ul {
      padding-left: 20px;
      margin: 10px 0;
    }

    .info-content li {
      margin: 8px 0;
    }
    .tab-container {
      display: flex;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      background-color: var(--card-bg);
      box-shadow: 0 2px 5px var(--shadow-color);
      flex-wrap: wrap; /* Allow tabs to wrap on small screens */
    }

    .tab {
      flex: 1 1 auto; /* Allow tabs to grow and shrink, auto basis */
      padding: 12px 8px; /* Adjusted padding */
      text-align: center;
      cursor: pointer;
      color: var(--text-color);
      border: none;
      background: none;
      transition: background-color 0.3s;
      font-size: 0.9em; /* Slightly smaller font */
      min-width: 80px; /* Minimum width for each tab */
    }

    .tab.active {
      background-color: var(--primary-color);
      color: var(--card-bg);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .chart-container {
      background-color: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px var(--shadow-color);
    }

    .chart-title {
        color: var(--primary-color);
        margin-bottom: 15px;
        text-align: center;
        font-size: 1.2em;
    }

    .steps-container {
      background-color: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px var(--shadow-color);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .steps-circle {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 20px 0;
    }

    .steps-ring {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .steps-ring-bg {
      fill: none;
      stroke: var(--progress-bg);
      stroke-width: 8;
    }

    .steps-ring-progress {
      fill: none;
      stroke: var(--primary-color);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.5s ease-in-out;
    }

    .steps-count {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #stepsNumber {
      font-size: 2.5em;
      font-weight: bold;
      color: var(--primary-color);
    }

    .steps-goal {
      margin-top: 20px;
      text-align: center;
    }

    .steps-goal-input {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    #stepsGoalInput {
      width: 120px;
    }

    /* Metabolism Calculator Styles */
    .metabolism-calculator {
      background-color: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px var(--shadow-color);
    }
    .metabolism-calculator h2, .metabolism-calculator h3 {
      color: var(--primary-color);
      margin-top: 0;
      margin-bottom: 15px;
    }
    .metabolism-calculator label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .metabolism-calculator input[type="number"],
    .metabolism-calculator select {
      margin-bottom: 15px; /* Increase bottom margin */
    }
    .metabolism-calculator button {
        display: block; /* Make button take full width */
        width: 100%;
        margin: 15px 0 0 0; /* Adjust margin */
    }
    .result-display {
      margin-top: 20px;
      padding: 15px;
      background-color: var(--bg-color); /* Use bg color for contrast */
      border: 1px solid var(--border-color);
      border-radius: 5px;
      text-align: center;
      font-size: 1.1em;
      font-weight: bold;
    }
    .result-display span {
        color: var(--success-color); /* Highlight the number */
    }
    #tdeeSection {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
    }
    .goal-options {
        display: flex;
        justify-content: space-around;
        margin: 15px 0;
    }
    .goal-options button {
        width: auto; /* Override block width */
        flex: 1;
        margin: 0 5px;
        background-color: var(--progress-bg); /* Default style */
        color: var(--text-color);
    }
     .goal-options button.selected {
        background-color: var(--primary-color);
        color: var(--card-bg);
     }

  </style>
</head>

        modal.querySelectorAll('.muscle-suggestion').forEach(button => {
            button.addEventListener('click', () => {
                const selectedMuscle = button.dataset.muscle;
                container.remove();
                
                const weeklyGoal = parseInt(prompt(translations[currentLanguage].enterWeeklyGoal.replace('{0}', selectedMuscle)));
                if (!isNaN(weeklyGoal)) {

      muscleGroups[index].count++;

        celebrateGoalReached(index);
      }
      saveMuscleGroups();
      renderMuscleGroups();
      if (document.getElementById('statsContent').classList.contains('active')) {
        updateWorkoutChart();
      }
    }

    function decrementCount(index) {
      if (muscleGroups[index].count > 0) {
        muscleGroups[index].count--;
        saveMuscleGroups();
        renderMuscleGroups();
        if (document.getElementById('statsContent').classList.contains('active')) {
          updateWorkoutChart();
        }
      }
    }

    function loadData() { 
      const savedMuscleGroups = localStorage.getItem('muscleGroups');
      if (savedMuscleGroups) {
        muscleGroups = JSON.parse(savedMuscleGroups);
      }
      lastResetDate = localStorage.getItem('lastResetDate') || new Date().toISOString().split('T')[0];
      autoResetEnabled = localStorage.getItem('autoResetEnabled') === 'true';
      document.getElementById('autoResetToggle').checked = autoResetEnabled;

      currentLanguage = localStorage.getItem('language') || 'fr';
      document.getElementById('languageSelect').value = currentLanguage;

      isDarkMode = localStorage.getItem('darkMode') === 'true';
      document.getElementById('themeToggle').checked = isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');

      const savedWorkoutStats = localStorage.getItem('weeklyWorkoutStats');
      if (savedWorkoutStats) {
        weeklyWorkoutStats = JSON.parse(savedWorkoutStats);
      }

      stepsCount = parseInt(localStorage.getItem('stepsCount') || '0');
      stepsGoal = parseInt(localStorage.getItem('stepsGoal') || '10000');
      const savedDailySteps = localStorage.getItem('dailySteps');
       if (savedDailySteps) {
         dailySteps = JSON.parse(savedDailySteps);
       }
       const savedWeeklySteps = localStorage.getItem('weeklySteps');
        if (savedWeeklySteps) {
         weeklySteps = JSON.parse(savedWeeklySteps);
        }

       currentDayKey = new Date().toISOString().split('T')[0]; 
       if (!dailySteps[currentDayKey]) {
           dailySteps[currentDayKey] = stepsCount;
       } else {
           stepsCount = dailySteps[currentDayKey];
       }
       saveStepsData(); 
    }

    function renderMuscleGroups() {
      const muscleGroupsContainer = document.getElementById('muscle-groups');
      muscleGroupsContainer.innerHTML = '';
      muscleGroups.forEach((muscleGroup, index) => {
        const muscleGroupElement = document.createElement('div');
        muscleGroupElement.className = 'muscle-group';
        const progress = Math.min((muscleGroup.count / muscleGroup.weeklyGoal) * 100, 100);
        const extraProgress = Math.max(((muscleGroup.count - muscleGroup.weeklyGoal) / muscleGroup.weeklyGoal) * 100, 0);
        const goalReached = muscleGroup.count >= muscleGroup.weeklyGoal;
        const extraSets = Math.max(muscleGroup.count - muscleGroup.weeklyGoal, 0);
        muscleGroupElement.innerHTML = `
          <h3>${muscleGroup.name}</h3>
          <p>${translations[currentLanguage].sets}: ${muscleGroup.count} / ${muscleGroup.weeklyGoal}
             ${extraSets > 0 ? `<span class="extra-sets">(+${extraSets})</span>` : ''}
          </p>
          <div class="progress-bar">
            <div class="progress" style="width: ${progress}%;"></div>
            ${extraProgress > 0 ? `<div class="progress-extra" style="width: ${extraProgress}%;"></div>` : ''}

          <button onclick="decrementCount(${index})">-</button>
          <button onclick="incrementCount(${index})">+</button>

          <button onclick="resetCount(${index})">${translations[currentLanguage].reset}</button>

      saveMuscleGroups();

      const labels = Object.keys(weeklyWorkoutStats).sort();

    function aggregateWeeklySteps() {
        weeklySteps = {}; 
        for (const dayKey in dailySteps) {
            const date = new Date(dayKey);
            const weekData = getWeekNumber(date);
            const weekKey = `${weekData.year}-${weekData.week}`;
            if (!weeklySteps[weekKey]) {
                weeklySteps[weekKey] = 0;
            }
            weeklySteps[weekKey] += dailySteps[dayKey];
        }
        saveStepsData(); 
    }

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return { week: weekNo, year: d.getUTCFullYear() };
    }

    function getRandomColor() {
      const letters = '0123456789ABCDEF';
      let color = '#';
      for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
      }
      return color;
    }

    let stepSensor = null;
    let lastMotionTimestamp = 0;
    const stepDebounceTime = 300; 

    async function initStepCounter() {
        updateStepsDisplay();

        if (stepSensor) {
            return;
        }

        try {
             if ('Accelerometer' in window) {
                const { state } = await navigator.permissions.query({ name: 'accelerometer' });
                if (state === 'granted') {
                    startAccelerometer();
                } else if (state === 'prompt') {
                     try {
                         stepSensor = new Accelerometer({ frequency: 1 }); 
                         stepSensor.addEventListener('reading', handleMotion);
                         stepSensor.addEventListener('error', handleSensorError);
                         stepSensor.start();
                     } catch (error) {
                         fallbackToDeviceMotion();
                     }
                } else { 
                     fallbackToDeviceMotion(); 
                }
            } else {
                fallbackToDeviceMotion(); 
            }
        } catch (error) {
            console.error('Error initializing step counter:', error);
            if (document.getElementById('stepsContent').classList.contains('active')) { 
               alert(translations[currentLanguage].sensorNotAvailable);
            }
            fallbackToDeviceMotion(); 
        }
    }

    function fallbackToDeviceMotion() {
        console.log("Falling back to DeviceMotionEvent");
        if ('DeviceMotionEvent' in window && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotionLegacy);
                    } else {
                         if (document.getElementById('stepsContent').classList.contains('active')) {
                             alert(translations[currentLanguage].sensorPermissionDenied);
                         }
                    }
                })
                .catch(error => {
                     console.error("DeviceMotionEvent permission request error:", error);
                      if (document.getElementById('stepsContent').classList.contains('active')) {
                         alert(translations[currentLanguage].sensorNotAvailable);
                      }
                });
        } else if ('DeviceMotionEvent' in window) {
             window.addEventListener('devicemotion', handleMotionLegacy);
        } else {
             if (document.getElementById('stepsContent').classList.contains('active')) {
                alert(translations[currentLanguage].sensorNotAvailable);
             }
        }
    }

    function startAccelerometer() {
        try {
            stepSensor = new Accelerometer({ frequency: 1 }); 
             stepSensor.addEventListener('reading', handleMotion);
             stepSensor.addEventListener('error', handleSensorError);
             stepSensor.start();
             setupDailyReset(); 
        } catch (error) {
             console.error("Failed to start Accelerometer:", error);
             if (document.getElementById('stepsContent').classList.contains('active')) {
                 alert(translations[currentLanguage].sensorNotAvailable + " Error: " + error.message);
             }
             fallbackToDeviceMotion(); 
        }
    }

    function handleSensorError(event) {
        console.error('Sensor Error:', event.error.name, event.error.message);
         if (document.getElementById('stepsContent').classList.contains('active')) {
            alert(translations[currentLanguage].sensorNotAvailable + ` (${event.error.name})`);
         }
        if (stepSensor) {
             stepSensor.stop();
             stepSensor = null;
        }
    }

    function handleMotion(event) {
        let x, y, z;
         if (event.accelerationIncludingGravity) { 
             x = event.accelerationIncludingGravity.x;
             y = event.accelerationIncludingGravity.y;
             z = event.accelerationIncludingGravity.z;
         } else if (stepSensor && stepSensor.x !== null) { 
             x = stepSensor.x;
             y = stepSensor.y;
             z = stepSensor.z;
         } else {
             return; 
         }

        if (x === null || y === null || z === null) return; 

        const magnitude = Math.sqrt(x * x + y * y + z * z);
        const threshold = 11; 
        const now = Date.now();

        if (magnitude > threshold && (now - lastMotionTimestamp > stepDebounceTime)) {
             lastMotionTimestamp = now;
             incrementStepCount();
         }
    }

    function handleMotionLegacy(event) {
         handleMotion(event); 
    }

    function incrementStepCount() {
        const today = new Date().toISOString().split('T')[0];
        if (today !== currentDayKey) {
            if (dailySteps[currentDayKey] !== undefined) {
                 saveStepsData(); 
            }
            stepsCount = 1; 
            currentDayKey = today;
            dailySteps[currentDayKey] = stepsCount;
        } else {
             stepsCount++;
             dailySteps[currentDayKey] = stepsCount;
        }

        updateStepsDisplay();
        saveStepsData(); 

        if (document.getElementById('statsContent').classList.contains('active')) {
             updateStepsChart();
        }
    }

    function setupDailyReset() {
         const now = new Date();
         const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
         const timeUntilMidnight = tomorrow - now;

         setTimeout(() => {
             dailySteps[currentDayKey] = stepsCount;
             aggregateWeeklySteps(); 
             saveStepsData();

             stepsCount = 0;
             currentDayKey = new Date().toISOString().split('T')[0];
             dailySteps[currentDayKey] = 0; 
             saveStepsData();
             updateStepsDisplay(); 

             setInterval(() => {
                 dailySteps[currentDayKey] = stepsCount; 
                 aggregateWeeklySteps();
                 saveStepsData();

                 stepsCount = 0;
                 currentDayKey = new Date().toISOString().split('T')[0];
                 dailySteps[currentDayKey] = 0;
                 saveStepsData();
                 updateStepsDisplay();
             }, 24 * 60 * 60 * 1000);
         }, timeUntilMidnight);
    }

    function updateStepsDisplay() {
      const stepsNumberEl = document.getElementById('stepsNumber');
      const stepsLabelEl = document.getElementById('stepsLabel');
      const stepsRingEl = document.querySelector('.steps-ring-progress');
      const stepsGoalLabelEl = document.getElementById('stepsGoalLabel');
      const stepsGoalInputEl = document.getElementById('stepsGoalInput');

      if (stepsNumberEl) stepsNumberEl.textContent = stepsCount.toLocaleString();
      if (stepsLabelEl) stepsLabelEl.textContent = translations[currentLanguage].steps;
      if (stepsGoalLabelEl) stepsGoalLabelEl.textContent = translations[currentLanguage].stepsGoal;
      if (stepsGoalInputEl) stepsGoalInputEl.value = stepsGoal;

      if (stepsRingEl) {
          const progress = stepsGoal > 0 ? Math.min(stepsCount / stepsGoal, 1) : 0;
          const circumference = 2 * Math.PI * 45; 
          stepsRingEl.style.strokeDashoffset = circumference * (1 - progress);
      }
    }

    function updateStepsGoal() {
      const goalInput = document.getElementById('stepsGoalInput');
      const newGoal = parseInt(goalInput.value);
      if (!isNaN(newGoal) && newGoal >= 1) { 
        stepsGoal = newGoal;
        saveStepsData(); 
        updateStepsDisplay(); 

        if (document.getElementById('statsContent').classList.contains('active')) {
             updateStepsChart();
        }
      } else {
          goalInput.value = stepsGoal; 
      }
    }

    function calculateBMR() {
        const weight = parseInt(document.getElementById('weight').value);
        const height = parseInt(document.getElementById('height').value);
        const age = parseInt(document.getElementById('age').value);
        const gender = document.getElementById('gender').value;

        if (weight && height && age && gender) {
            let bmr;
            if (gender === 'male') {
                bmr = 66 + (13.7 * weight) + (5 * height) - (6.8 * age);
            } else {
                bmr = 655 + (9.6 * weight) + (1.8 * height) - (4.7 * age);
            }

            calculatedBMR = bmr;
            document.getElementById('bmrResult').style.display = 'block';
            document.getElementById('bmrResult').innerHTML = translations[currentLanguage].bmrResultText.replace('{0}', Math.round(bmr));
            document.getElementById('tdeeSection').style.display = 'block';
        }
    }

    function calculateTDEE() {
        const activityLevel = parseFloat(document.getElementById('activityLevel').value);
        const goal = selectedGoal;

        if (calculatedBMR && activityLevel) {
            let tdee;
            if (goal === 'lose') {
                tdee = calculatedBMR * activityLevel - 500;
            } else if (goal === 'maintain') {
                tdee = calculatedBMR * activityLevel;
            } else {
                tdee = calculatedBMR * activityLevel + 500;
            }

            document.getElementById('tdeeResult').style.display = 'block';
            document.getElementById('tdeeResult').innerHTML = translations[currentLanguage].tdeeResultText.replace('{0}', Math.round(tdee));
        }
    }

    function selectGoal(button) {
        const goal = button.dataset.goal;
        selectedGoal = goal;
        document.querySelectorAll('.goal-options button').forEach(b => b.classList.remove('selected'));
        button.classList.add('selected');
    }

    function loadData() { 
      const savedMuscleGroups = localStorage.getItem('muscleGroups');
      if (savedMuscleGroups) {
        muscleGroups = JSON.parse(savedMuscleGroups);
      }
      lastResetDate = localStorage.getItem('lastResetDate') || new Date().toISOString().split('T')[0];
      autoResetEnabled = localStorage.getItem('autoResetEnabled') === 'true';
      document.getElementById('autoResetToggle').checked = autoResetEnabled;

      currentLanguage = localStorage.getItem('language') || 'fr';
      document.getElementById('languageSelect').value = currentLanguage;

      isDarkMode = localStorage.getItem('darkMode') === 'true';
      document.getElementById('themeToggle').checked = isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');

      const savedWorkoutStats = localStorage.getItem('weeklyWorkoutStats');
      if (savedWorkoutStats) {
        weeklyWorkoutStats = JSON.parse(savedWorkoutStats);
      }

      stepsCount = parseInt(localStorage.getItem('stepsCount') || '0');
      stepsGoal = parseInt(localStorage.getItem('stepsGoal') || '10000');
      const savedDailySteps = localStorage.getItem('dailySteps');
       if (savedDailySteps) {
         dailySteps = JSON.parse(savedDailySteps);
       }
       const savedWeeklySteps = localStorage.getItem('weeklySteps');
        if (savedWeeklySteps) {
         weeklySteps = JSON.parse(savedWeeklySteps);
        }

       currentDayKey = new Date().toISOString().split('T')[0]; 
       if (!dailySteps[currentDayKey]) {
           dailySteps[currentDayKey] = stepsCount;
       } else {
           stepsCount = dailySteps[currentDayKey];
       }
       saveStepsData(); 
    }

    // Initial load and render
    loadData(); 
    updateUILanguage(); 
    renderMuscleGroups(); 
    updateStepsDisplay(); 
    checkAutoReset(); 
    setupDailyReset(); 

    setInterval(checkAutoReset, 60 * 60 * 1000);

    setTimeout(initStepCounter, 500);
  </script>
</body>
</html>
